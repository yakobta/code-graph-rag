name: PR Split Score

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  score:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: pr-split score
        uses: vitali87/pr-split@v1.0.0
        with:
          max-loc: "400"
